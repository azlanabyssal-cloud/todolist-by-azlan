<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#312e81" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Checkmark circle outer ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
  <!-- Checkmark -->
  <polyline
    points="176,256 228,312 340,196"
    fill="none"
    stroke="white"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
</svg>
